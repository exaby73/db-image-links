name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact-name: macos-installer
          - platform: windows-latest
            artifact-name: windows-installer
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.16.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri:build

      - name: Archive macOS app for release
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "apps/desktop/src-tauri/target/release/bundle/macos/Dropbox Image Links.app" \
            "apps/desktop/src-tauri/target/release/bundle/macos/Dropbox Image Links_${{ github.ref_name }}_macos.zip"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: apps/desktop/src-tauri/target/release/bundle
          if-no-files-found: error

      - name: Attach installers to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/release/bundle/macos/*.zip
