name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact-name: macos-installer
          - platform: windows-latest
            artifact-name: windows-installer
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.16.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri:build

      - name: Archive macOS app
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - \
            "apps/desktop/src-tauri/target/release/bundle/macos/Dropbox Image Links.app"
          codesign --verify --deep --strict --verbose=2 \
            "apps/desktop/src-tauri/target/release/bundle/macos/Dropbox Image Links.app"
          ditto -c -k --sequesterRsrc --keepParent \
            "apps/desktop/src-tauri/target/release/bundle/macos/Dropbox Image Links.app" \
            "apps/desktop/src-tauri/target/release/bundle/macos/Dropbox_Image_Links_${{ github.ref_name }}_macos.zip"

      - name: Normalize Windows installer filename
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem "apps/desktop/src-tauri/target/release/bundle" -Recurse -Filter "*.msi" |
            ForEach-Object {
              $normalizedName = $_.Name.Replace(" ", "_")
              if ($normalizedName -ne $_.Name) {
                Rename-Item -LiteralPath $_.FullName -NewName $normalizedName
              }
            }

      - name: Upload macOS app artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: apps/desktop/src-tauri/target/release/bundle/macos/*.zip
          if-no-files-found: error

      - name: Upload Windows installer artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: apps/desktop/src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: error

      - name: Attach macOS app to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/src-tauri/target/release/bundle/macos/*.zip

      - name: Attach Windows installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/src-tauri/target/release/bundle/**/*.msi
